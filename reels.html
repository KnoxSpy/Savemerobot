<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SnavSaving Shorts</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* App-wide Elegant Loading Screen */
        #app-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .tiktok-style-logo {
            width: 80px;
            height: 80px;
            animation: pulseGlow 1.6s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.7; filter: drop-shadow(0 0 8px rgba(229, 62, 62, 0.6)); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 20px rgba(49, 130, 206, 0.8)); }
            100% { transform: scale(0.9); opacity: 0.7; filter: drop-shadow(0 0 8px rgba(229, 62, 62, 0.6)); }
        }

        .loader-text {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        /* Video Container and Sharp rendering */
        .reels-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            transform: translate3d(0, 0, 0);
        }

        .reel {
            position: relative;
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        video.loaded {
            opacity: 1;
        }

        /* Play/Pause Indicator Overlay */
        .play-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 8;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .play-indicator.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Overlay Layout */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 60px 16px 30px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 5;
        }

        /* Bottom Profile details next to each other */
        .video-details {
            max-width: 72%;
            color: #fff;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .uploader-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            animation: elegantSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes elegantSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .uploader-info img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .uploader-info h3 {
            font-size: 14px;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .video-details p {
            font-size: 13px;
            opacity: 0.85;
            line-height: 1.35;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Clickable link inside details */
        .caption-link {
            color: #3182ce;
            text-decoration: none;
            font-weight: 600;
            pointer-events: auto;
        }
        .caption-link:hover {
            text-decoration: underline;
        }

        /* Actions Panel */
        .actions-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            pointer-events: auto;
            margin-bottom: 8px;
        }

        .action-button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 500;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-button:active {
            transform: scale(0.88);
        }

        .action-icon {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.2s, color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .uploader-panel-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #e53e3e;
            padding: 1px;
            background: #000;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 4px;
        }
        .uploader-panel-pic:active {
            transform: scale(0.9);
        }
        .uploader-panel-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .action-button.liked .action-icon {
            background: #e53e3e;
            color: #fff;
        }

        .action-button.saved .action-icon {
            background: #3182ce;
            color: #fff;
        }

        .action-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Heart Pop Animation */
        .heart-pop {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #e53e3e;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes heartPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.4) rotate(10deg); opacity: 0.95; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
        }

        .pop-active {
            animation: heartPop 0.75s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .loading {
            position: absolute;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Bottom Sheet Popup Styles */
        .bottom-sheet {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            visibility: hidden;
            transition: visibility 0.25s;
        }

        .bottom-sheet.open {
            visibility: visible;
        }

        .sheet-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .bottom-sheet.open .sheet-overlay {
            opacity: 1;
        }

        .sheet-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #141414;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            transform: translateY(100%);
            transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
            color: #fff;
            box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
        }

        .bottom-sheet.open .sheet-content {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .sheet-drag-handle {
            width: 36px;
            height: 4px;
            background: #333;
            border-radius: 10px;
        }

        .profile-popup-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .profile-popup-info img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #e53e3e;
            object-fit: cover;
        }

        .profile-popup-info h4 {
            font-size: 16px;
            font-weight: 600;
        }

        /* Toggle Switches */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .setting-item span {
            font-size: 13px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .25s;
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .25s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #38a169;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>

    <!-- Animated Loading Screen HTML -->
    <div id="app-loader">
        <!-- TikTok-style animated SVG icon -->
        <svg class="tiktok-style-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.589 12.55c-1.8 0-3.45-.69-4.7-1.83V17c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c.3 0 .59.03.88.08V13.2c-.29-.07-.58-.1-.88-.1-2.15 0-3.9 1.75-3.9 3.9s1.75 3.9 3.9 3.9 3.9-1.75 3.9-3.9v-13h2.12c.38 2.61 2.63 4.65 5.37 4.65V6.45c-1.42 0-2.63-.84-3.2-2.05H14.19v9.12c1.07.65 2.33 1.03 3.69 1.03h1.71v-2h-1.71z" fill="#00f2fe"/>
            <path d="M19.589 11.55c-1.8 0-3.45-.69-4.7-1.83V16c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c.3 0 .59.03.88.08V12.2c-.29-.07-.58-.1-.88-.1-2.15 0-3.9 1.75-3.9 3.9s1.75 3.9 3.9 3.9 3.9-1.75 3.9-3.9v-13h2.12c.38 2.61 2.63 4.65 5.37 4.65V5.45c-1.42 0-2.63-.84-3.2-2.05H14.19v9.12c1.07.65 2.33 1.03 3.69 1.03h1.71v-2h-1.71z" fill="#fe0979" style="mix-blend-mode: screen;"/>
        </svg>
        <div class="loader-text" id="loaderText">লোডিং হচ্ছে...</div>
    </div>

    <div class="reels-container" id="reelsContainer">
        <!-- Videos will be injected dynamically here -->
    </div>

    <!-- Bottom Sheet Popup HTML -->
    <div class="bottom-sheet" id="profileModal">
        <div class="sheet-overlay" onclick="closeProfileModal()"></div>
        <div class="sheet-content">
            <div class="sheet-header">
                <div class="sheet-drag-handle"></div>
            </div>
            <div class="profile-popup-info">
                <img id="modalProfilePic" src="https://via.placeholder.com/150" alt="Profile">
                <h4 id="modalProfileName">ইউজারনেম</h4>
            </div>
            <div class="settings-list">
                <div class="setting-item">
                    <span id="txt-upload">Start Uploading Reels</span>
                    <label class="switch">
                        <input type="checkbox" id="uploadToggle" onchange="updateProfileSetting()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span id="txt-notify">Notifications</span>
                    <label class="switch">
                        <input type="checkbox" id="notificationToggle" onchange="updateProfileSetting()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const currentUser = {
            id: tg?.initDataUnsafe?.user?.id || "demo_user_123",
            username: tg?.initDataUnsafe?.user?.username || "Guest_User",
            photo: tg?.initDataUnsafe?.user?.photo_url || "https://via.placeholder.com/150"
        };

        let videos = [];
        let appLang = "bn"; // Default language
        const container = document.getElementById('reelsContainer');

        // Localization translations dictionary
        const uiStrings = {
            bn: {
                save: "সেভ করুন",
                refresh: "রিফ্রেশ",
                report: "রিপোর্ট",
                no_caption: "কোনো ক্যাপশন দেওয়া হয়নি।",
                loading: "লোডিং হচ্ছে...",
                upload_reels: "রিল আপলোড চালু রাখুন",
                notifications: "বিজ্ঞপ্তি/নোটিফিকেশন",
                fetching: "ভিডিও প্রস্তুত করা হচ্ছে..."
            },
            en: {
                save: "Save",
                refresh: "Refresh",
                report: "Report",
                no_caption: "No caption provided.",
                loading: "Loading...",
                upload_reels: "Start Uploading Reels",
                notifications: "Notifications",
                fetching: "Fetching Videos..."
            }
        };

        // বটের ভাষা সেটিংস রিট্রাইভ করা
        async function fetchLanguageAndVideos() {
            try {
                const res = await fetch(`/api/user/lang?userId=${currentUser.id}`);
                const data = await res.json();
                appLang = data.lang || "bn";
            } catch (err) {
                console.error("Lang fetch failed", err);
            }
            // সেটআপ ট্রান্সলেশন
            document.getElementById('loaderText').innerText = uiStrings[appLang].fetching;
            fetchVideos();
        }

        // ক্যাপশন ফরম্যাটিং করার ফাংশন (লিংক, বোল্ড এবং ইউজারনেম ক্লিকযোগ্য করার জন্য)
        function formatCaption(text) {
            if (!text) return "";
            
            // HTML ট্যাগ প্রতিরোধ করা
            let safeText = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            // URL লিংক রূপান্তর
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            safeText = safeText.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" class="caption-link" onclick="event.stopPropagation();">${url}</a>`;
            });

            // টেলিগ্রাম ইউজারনেম (@username) রূপান্তর
            const mentionRegex = /@([a-zA-Z0-9_]{5,32})/g;
            safeText = safeText.replace(mentionRegex, function(mention, username) {
                return `<a href="https://t.me/${username}" target="_blank" class="caption-link" onclick="event.stopPropagation();">${mention}</a>`;
            });

            // বোল্ড ফরম্যাটিং (**text** বা *text*)
            safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            safeText = safeText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');

            return safeText;
        }

        async function fetchVideos() {
            try {
                let seenVideos = JSON.parse(localStorage.getItem('seen_videos') || '[]');
                
                const response = await fetch('/api/videos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId: currentUser.id,
                        seenVideos: seenVideos 
                    })
                });
                
                const data = await response.json();
                if (data.wasReset) {
                    localStorage.setItem('seen_videos', '[]');
                }
                
                videos = data.videos || [];

                // নতুন আপলোড করা ভিডিওগুলোকে ফিডে প্রথমে দেখানোর জন্য সাজানো
                videos.sort((a, b) => {
                    const dateA = a.createdAt ? new Date(a.createdAt) : parseInt(a.id) || 0;
                    const dateB = b.createdAt ? new Date(b.createdAt) : parseInt(b.id) || 0;
                    return dateB - dateA; // Newest First
                });

                renderVideos();
            } catch (err) {
                console.error("Failed to load videos", err);
                hideLoader();
            }
        }

        function renderVideos() {
            if (videos.length === 0) {
                container.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100vh;">কোনো নতুন ভিডিও পাওয়া যায়নি।</div>`;
                hideLoader();
                return;
            }

            const str = uiStrings[appLang];

            // মডাল টেক্সট আপডেট
            document.getElementById('txt-upload').innerText = str.upload_reels;
            document.getElementById('txt-notify').innerText = str.notifications;

            container.innerHTML = videos.map((video, index) => {
                const streamUrl = `/api/video/stream/${encodeURIComponent(video.fileId)}`;
                const isLiked = localStorage.getItem(`liked_${video.id}`) === 'true';
                const isSaved = localStorage.getItem(`saved_${video.id}`) === 'true';
                
                const uploaderName = video.uploaderName || "@reelsuploader";
                const uploaderPic = video.uploaderPic || "https://via.placeholder.com/150";

                return `
                    <div class="reel" id="reel-${video.id}" data-index="${index}">
                        <div class="loading">${str.loading}</div>
                        
                        <!-- Play/Pause Indicator Element -->
                        <div class="play-indicator">
                            <svg viewBox="0 0 24 24" width="36" height="36" fill="#fff">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>

                        <video src="${streamUrl}" loop playsinline webkit-playsinline preload="auto" onloadedmetadata="videoLoaded(this)" onclick="togglePlay(this)" onended="markAsWatched('${video.id}')"></video>
                        
                        <div class="heart-pop" id="heart-pop-${video.id}">
                            <svg viewBox="0 0 24 24" width="70" height="70" fill="currentColor">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </div>

                        <div class="overlay">
                            <!-- Bottom Detail displays current Telegram user (viewer) who opened the bot -->
                            <div class="video-details">
                                <div class="uploader-info" onclick="openProfileModal('${currentUser.id}', '${currentUser.username}', '${currentUser.photo}')">
                                    <img src="${currentUser.photo}" alt="${currentUser.username}">
                                    <h3>${currentUser.username} (You)</h3>
                                </div>
                                <p>${formatCaption(video.caption) || str.no_caption}</p>
                            </div>

                            <div class="actions-panel">
                                <!-- Profile Photo above Love Reaction displays Video Creator -->
                                <div class="uploader-panel-pic" onclick="openProfileModal('${video.uploaderId}', '${uploaderName}', '${uploaderPic}')">
                                    <img src="${uploaderPic}" alt="${uploaderName}">
                                </div>

                                <!-- Love Button -->
                                <button class="action-button ${isLiked ? 'liked' : ''}" onclick="toggleLike('${video.id}', event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                        </svg>
                                    </div>
                                    <span id="like-count-${video.id}">${video.likes || 0}</span>
                                </button>

                                <!-- Views Button -->
                                <div class="action-button" style="pointer-events: none;">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                        </svg>
                                    </div>
                                    <span id="view-count-${video.id}">${video.views || 0}</span>
                                </div>

                                <!-- Save Button -->
                                <button class="action-button ${isSaved ? 'saved' : ''}" onclick="toggleSave('${video.id}', event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                                        </svg>
                                    </div>
                                    <span>${str.save}</span>
                                </button>

                                <!-- Refresh Button -->
                                <button class="action-button" onclick="refreshFeed(event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
                                        </svg>
                                    </div>
                                    <span>${str.refresh}</span>
                                </button>

                                <!-- Report Button -->
                                <button class="action-button" onclick="reportVideo('${video.id}', event)">
                                    <div class="action-icon" style="background: rgba(229, 62, 62, 0.15);">
                                        <svg viewBox="0 0 24 24" style="color: #e53e3e;">
                                            <path d="M15.73 3H8.27L3 8.27v7.46L8.27 21h7.46L21 15.73V8.27L15.73 3zM12 17.3c-.72 0-1.3-.58-1.3-1.3 0-.72.58-1.3 1.3-1.3.72 0 1.3.58 1.3 1.3 0 .72-.58 1.3-1.3 1.3zm1-4.3h-2V7h2v6z"/>
                                        </svg>
                                    </div>
                                    <span style="color: #e53e3e;">${str.report}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            setupIntersectionObserver();
            setupDoubleTap();
        }

        // প্রথম ভিডিও লোড হওয়ার পর স্ক্রিন রিভিল হবে
        function videoLoaded(videoElement) {
            videoElement.classList.add('loaded');
            const loadingText = videoElement.parentElement.querySelector('.loading');
            if (loadingText) loadingText.style.display = 'none';
            
            // প্রথম ভিডিও প্রস্তুত হলেই লোডার চলে যাবে
            const reelParent = videoElement.closest('.reel');
            if (reelParent && reelParent.getAttribute('data-index') === '0') {
                hideLoader();
            }
        }

        function hideLoader() {
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                }, 400);
            }
        }

        // প্লে/পজ ইন্ডিকেটর সহ কন্ট্রোল
        function togglePlay(video) {
            const parent = video.parentElement;
            const playIndicator = parent.querySelector('.play-indicator');
            
            if (video.paused) {
                video.play().then(() => {
                    if (playIndicator) {
                        playIndicator.classList.remove('show');
                    }
                }).catch(e => console.log("Play failed", e));
            } else {
                video.pause();
                if (playIndicator) {
                    playIndicator.classList.add('show');
                    // পজ ইন্ডিকেটরটি ২ সেকেন্ড পর নিজে থেকেই অদৃশ্য করার ব্যাকআপ
                    setTimeout(() => {
                        if (video.paused && playIndicator.classList.contains('show')) {
                            // keeps showing while paused
                        } else {
                            playIndicator.classList.remove('show');
                        }
                    }, 2000);
                }
            }
        }

        async function toggleLike(videoId, event) {
            if (event) event.stopPropagation();
            
            const likeBtn = document.querySelector(`#reel-${videoId} .action-button`);
            const likeCountSpan = document.getElementById(`like-count-${videoId}`);
            const isLiked = likeBtn.classList.contains('liked');
            let currentLikes = parseInt(likeCountSpan.innerText);

            const newLikedState = !isLiked;
            if (newLikedState) {
                likeBtn.classList.add('liked');
                likeCountSpan.innerText = currentLikes + 1;
                localStorage.setItem(`liked_${videoId}`, 'true');
            } else {
                likeBtn.classList.remove('liked');
                likeCountSpan.innerText = Math.max(0, currentLikes - 1);
                localStorage.removeItem(`liked_${videoId}`);
            }

            try {
                await fetch('/api/video/like', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        videoId, 
                        isLiked: newLikedState, 
                        userId: currentUser.id,
                        username: currentUser.username 
                    })
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function toggleSave(videoId, event) {
            if (event) event.stopPropagation();
            
            const saveBtn = document.querySelector(`#reel-${videoId} .action-button:has(svg path[d*="M17 3H7"])`) || event.currentTarget;
            const isSaved = saveBtn.classList.contains('saved');
            const newSavedState = !isSaved;

            if (newSavedState) {
                saveBtn.classList.add('saved');
                localStorage.setItem(`saved_${videoId}`, 'true');
            } else {
                saveBtn.classList.remove('saved');
                localStorage.removeItem(`saved_${videoId}`);
            }

            try {
                await fetch('/api/video/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        videoId, 
                        userId: currentUser.id, 
                        isSaved: newSavedState 
                    })
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function reportVideo(videoId, event) {
            if (event) event.stopPropagation();
            const str = uiStrings[appLang];
            const confirmMsg = appLang === "bn" ? "রিপোর্ট করতে চান?" : "Do you want to report this?";
            if (!confirm(confirmMsg)) return;

            try {
                await fetch('/api/video/report', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id, username: currentUser.username })
                });
                alert(appLang === "bn" ? "সফল হয়েছে" : "Success");
            } catch (err) {
                console.error(err);
            }
        }

        function markAsWatched(videoId) {
            let seenVideos = JSON.parse(localStorage.getItem('seen_videos') || '[]');
            if (!seenVideos.includes(videoId)) {
                seenVideos.push(videoId);
                localStorage.setItem('seen_videos', JSON.stringify(seenVideos));
            }
        }

        async function trackView(videoId) {
            try {
                const viewCountSpan = document.getElementById(`view-count-${videoId}`);
                if (viewCountSpan) {
                    let currentViews = parseInt(viewCountSpan.innerText);
                    viewCountSpan.innerText = currentViews + 1;
                }
                await fetch('/api/video/view', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id })
                });
            } catch (err) {
                console.error(err);
            }
        }

        function refreshFeed(event) {
            if (event) event.stopPropagation();
            // রিলোড করার আগে লোদ স্ক্রিন ফিরিয়ে আনা
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.visibility = 'visible';
                loader.style.opacity = '1';
            }
            fetchVideos();
        }

        function setupIntersectionObserver() {
            const observerOptions = { root: container, threshold: 0.65 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const videoId = entry.target.id.replace('reel-', '');
                    const playIndicator = entry.target.querySelector('.play-indicator');
                    if (video) {
                        if (entry.isIntersecting) {
                            if (playIndicator) playIndicator.classList.remove('show');
                            video.play().then(() => trackView(videoId)).catch(() => {});
                        } else {
                            video.pause();
                            video.currentTime = 0;
                            if (playIndicator) playIndicator.classList.remove('show');
                        }
                    }
                });
            }, observerOptions);
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function setupDoubleTap() {
            document.querySelectorAll('.reel').forEach(reel => {
                let lastTap = 0;
                reel.addEventListener('click', function(e) {
                    // ক্যাপশন লিংক ক্লিক করলে ডাবল ট্যাপ ব্লক করা
                    if (e.target.classList.contains('caption-link')) return;

                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    if (tapLength < 300 && tapLength > 0) {
                        const videoId = reel.id.replace('reel-', '');
                        const heartPop = document.getElementById(`heart-pop-${videoId}`);
                        heartPop.classList.add('pop-active');
                        setTimeout(() => heartPop.classList.remove('pop-active'), 750);
                        const likeBtn = reel.querySelector('.action-button');
                        if (!likeBtn.classList.contains('liked')) toggleLike(videoId);
                    }
                    lastTap = currentTime;
                });
            });
        }

        let activeProfileUserId = null;
        async function openProfileModal(uploaderId, uploaderName, uploaderPic) {
            activeProfileUserId = uploaderId;
            document.getElementById('modalProfileName').innerText = uploaderName;
            document.getElementById('modalProfilePic').src = uploaderPic;

            // টগলগুলোর ডিফল্ট রূপ নির্ধারণ
            let uploadingChecked = true;
            let notificationChecked = true;

            try {
                const res = await fetch(`/api/user/settings?userId=${uploaderId}`);
                if (res.ok) {
                    const settings = await res.json();
                    uploadingChecked = settings.uploadingReels !== false;
                    notificationChecked = settings.notifications !== false;
                } else {
                    throw new Error();
                }
            } catch (err) {
                // অফলাইন বা লোকাল স্টোরেজ ব্যাকআপ
                uploadingChecked = localStorage.getItem(`setting_upload_${uploaderId}`) !== 'false';
                notificationChecked = localStorage.getItem(`setting_notify_${uploaderId}`) !== 'false';
            }

            document.getElementById('uploadToggle').checked = uploadingChecked;
            document.getElementById('notificationToggle').checked = notificationChecked;

            // শুধুমাত্র নিজের প্রোফাইল হলে সেটিংস অন/অফ করতে দেয়া হবে
            if (uploaderId !== currentUser.id) {
                document.getElementById('uploadToggle').disabled = true;
                document.getElementById('notificationToggle').disabled = true;
            } else {
                document.getElementById('uploadToggle').disabled = false;
                document.getElementById('notificationToggle').disabled = false;
            }
            
            document.getElementById('profileModal').classList.add('open');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('open');
        }

        // সেটিংস সফলভাবে লোকালস্টোরেজ এবং সার্ভারে আপডেট করার মেথড
        async function updateProfileSetting() {
            if (activeProfileUserId !== currentUser.id) return;
            const uploadingVal = document.getElementById('uploadToggle').checked;
            const notificationVal = document.getElementById('notificationToggle').checked;

            // সাথে সাথে লোকালস্টোরেজে আপডেট যাতে ল্যাগ ছাড়া টগল কাজ করে
            localStorage.setItem(`setting_upload_${currentUser.id}`, uploadingVal);
            localStorage.setItem(`setting_notify_${currentUser.id}`, notificationVal);

            try {
                await fetch('/api/user/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: currentUser.id,
                        uploadingReels: uploadingVal,
                        notifications: notificationVal
                    })
                });
            } catch (err) {
                console.error("Failed to sync settings with server", err);
            }
        }

        fetchLanguageAndVideos();
    </script>
</body>
