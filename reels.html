<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SnapSaving Shorts</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* App Loading Screen */
        #app-loader {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease, visibility 0.3s;
        }

        .tiktok-style-logo {
            width: 80px;
            height: 80px;
            animation: pulseGlow 1.4s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); filter: drop-shadow(0 0 5px rgba(229, 62, 62, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(49, 130, 206, 0.7)); }
            100% { transform: scale(0.9); filter: drop-shadow(0 0 5px rgba(229, 62, 62, 0.5)); }
        }

        .loader-text {
            margin-top: 18px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.8px;
        }

        /* High-Performance Container with GPU Acceleration */
        .reels-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .reel {
            position: relative;
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            will-change: transform;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            image-rendering: -webkit-optimize-contrast;
        }

        video.loaded {
            opacity: 1;
        }

        /* Play/Pause Central Indicator Overlay */
        .play-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 8;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .play-indicator.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Overlay Interface Layer */
        .overlay {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 60px 16px 30px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 5;
        }

        .video-details {
            max-width: 72%;
            color: #fff;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .uploader-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .uploader-info img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
        }

        .uploader-info h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .video-details p {
            font-size: 13px;
            opacity: 0.85;
            line-height: 1.35;
        }

        .caption-link {
            color: #3182ce;
            text-decoration: none;
            font-weight: 600;
            pointer-events: auto;
        }

        /* Actions Panel */
        .actions-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            pointer-events: auto;
            margin-bottom: 8px;
        }

        .action-button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 500;
            transition: transform 0.1s ease;
        }

        .action-button:active {
            transform: scale(0.9);
        }

        .action-icon {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Profile Photo above Love Reaction with blue badge wrap */
        .uploader-panel-pic-wrapper {
            position: relative;
            width: 42px; height: 42px;
            margin-bottom: 4px;
        }

        .uploader-panel-pic {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid #e53e3e;
            padding: 1px;
            background: #000;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .uploader-panel-pic img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .verified-badge {
            position: absolute;
            bottom: -1px; right: -1px;
            width: 14px; height: 14px;
            background: #1da1f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #000;
            color: #fff;
            font-size: 8px;
            font-weight: bold;
        }

        .action-button.liked .action-icon { background: #e53e3e; }
        .action-button.saved .action-icon { background: #3182ce; }

        .action-icon svg {
            width: 18px; height: 18px;
            fill: currentColor;
        }

        /* 3D Heart Pop */
        .heart-pop {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #e53e3e;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes heartPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.4) rotate(10deg); opacity: 0.95; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
        }

        .pop-active {
            animation: heartPop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .loading {
            position: absolute;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }

        /* Bottom Sheet Popup Styles */
        .bottom-sheet {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1000;
            visibility: hidden;
            transition: visibility 0.25s;
        }

        .bottom-sheet.open {
            visibility: visible;
        }

        .sheet-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .bottom-sheet.open .sheet-overlay {
            opacity: 1;
        }

        .sheet-content {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            background: #141414;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            transform: translateY(100%);
            transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
            color: #fff;
        }

        .bottom-sheet.open .sheet-content {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .sheet-drag-handle {
            width: 36px; height: 4px;
            background: #333;
            border-radius: 10px;
        }

        .profile-popup-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .profile-popup-info img {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid #e53e3e;
            object-fit: cover;
        }

        .profile-popup-info h4 {
            font-size: 16px;
            font-weight: 600;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px; height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .25s;
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .25s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #38a169; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Custom Toast Notification styling */
        #custom-toast {
            position: fixed;
            bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.25s ease, opacity 0.25s ease;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <!-- Animated Loader Screen -->
    <div id="app-loader">
        <svg class="tiktok-style-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.589 12.55c-1.8 0-3.45-.69-4.7-1.83V17c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c.3 0 .59.03.88.08V13.2c-.29-.07-.58-.1-.88-.1-2.15 0-3.9 1.75-3.9 3.9s1.75 3.9 3.9 3.9 3.9-1.75 3.9-3.9v-13h2.12c.38 2.61 2.63 4.65 5.37 4.65V6.45c-1.42 0-2.63-.84-3.2-2.05H14.19v9.12c1.07.65 2.33 1.03 3.69 1.03h1.71v-2h-1.71z" fill="#00f2fe"/>
            <path d="M19.589 11.55c-1.8 0-3.45-.69-4.7-1.83V16c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c.3 0 .59.03.88.08V12.2c-.29-.07-.58-.1-.88-.1-2.15 0-3.9 1.75-3.9 3.9s1.75 3.9 3.9 3.9 3.9-1.75 3.9-3.9v-13h2.12c.38 2.61 2.63 4.65 5.37 4.65V5.45c-1.42 0-2.63-.84-3.2-2.05H14.19v9.12c1.07.65 2.33 1.03 3.69 1.03h1.71v-2h-1.71z" fill="#fe0979" style="mix-blend-mode: screen;"/>
        </svg>
        <div class="loader-text" id="loaderText">Loading Videos...</div>
    </div>

    <!-- Container for dynamic reels -->
    <div class="reels-container" id="reelsContainer"></div>

    <!-- Toast Component -->
    <div id="custom-toast">
        <span id="toast-text">Success</span>
    </div>

    <!-- Own Settings Modal (Viewer) -->
    <div class="bottom-sheet" id="profileModal">
        <div class="sheet-overlay" onclick="closeProfileModal()"></div>
        <div class="sheet-content">
            <div class="sheet-header">
                <div class="sheet-drag-handle"></div>
            </div>
            <div class="profile-popup-info">
                <img id="modalProfilePic" src="https://via.placeholder.com/150" alt="Profile">
                <h4 id="modalProfileName">Username</h4>
            </div>
            <div class="settings-list">
                <div class="setting-item">
                    <span id="txt-upload">Start Uploading Reels</span>
                    <label class="switch">
                        <input type="checkbox" id="uploadToggle" onchange="updateProfileSetting()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span id="txt-notify">Notifications</span>
                    <label class="switch">
                        <input type="checkbox" id="notificationToggle" onchange="updateProfileSetting()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Uploader Details & Video Info Bottom Sheet -->
    <div class="bottom-sheet" id="uploaderSheet">
        <div class="sheet-overlay" onclick="closeUploaderSheet()"></div>
        <div class="sheet-content" style="background: #141414; border-top-left-radius: 16px; border-top-right-radius: 16px; padding: 20px;">
            <div class="sheet-header">
                <div class="sheet-drag-handle"></div>
            </div>
            <div class="profile-popup-info" style="margin-bottom: 12px;">
                <img id="upModalPic" src="" alt="Profile">
                <h4 id="upModalName">Uploader</h4>
            </div>
            
            <!-- Video Info Panel -->
            <div class="settings-list" style="margin-bottom: 16px;">
                <div class="setting-item">
                    <span>Video Size</span>
                    <span id="upModalSize" style="color: #ccc;">Unknown Size</span>
                </div>
                <div class="setting-item">
                    <span>Upload Date</span>
                    <span id="upModalDate" style="color: #ccc;">Unknown Date</span>
                </div>
                <div class="setting-item">
                    <span>Views</span>
                    <span id="upModalViews" style="color: #ccc;">0</span>
                </div>
            </div>

            <!-- Modal Action options -->
            <div style="display: flex; gap: 10px; flex-direction: column;">
                <button id="btnOpenTgProfile" style="background: #3182ce; color: #fff; border: none; outline: none; cursor: pointer; text-align: center; justify-content: center; font-weight: 600; width: 100%; border-radius: 10px; padding: 12px; font-size: 13px;">
                    Open Uploader Profile
                </button>
                
                <button id="btnReportVideoInSheet" style="background: rgba(229, 62, 62, 0.15); color: #e53e3e; border: 1px solid rgba(229, 62, 62, 0.3); outline: none; cursor: pointer; text-align: center; justify-content: center; font-weight: 600; width: 100%; border-radius: 10px; padding: 12px; font-size: 13px;">
                    ⚠️ Report Video
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const currentUser = {
            id: tg?.initDataUnsafe?.user?.id || "demo_user_123",
            username: tg?.initDataUnsafe?.user?.username || "Guest_User",
            photo: tg?.initDataUnsafe?.user?.photo_url || "https://via.placeholder.com/150"
        };

        let videos = [];
        let appLang = "en"; 
        let activeIndex = 0;
        const container = document.getElementById('reelsContainer');

        const uiStrings = {
            en: {
                save: "Save",
                refresh: "Refresh",
                report: "Report",
                no_caption: "No caption provided.",
                loading: "Loading...",
                upload_reels: "Reels Upload Syncing",
                notifications: "Notifications",
                fetching: "Preparing Feed...",
                share: "Share"
            },
            bn: {
                save: "সেভ করুন",
                refresh: "রিফ্রেশ",
                report: "রিপোর্ট",
                no_caption: "কোনো ক্যাপশন দেওয়া হয়নি।",
                loading: "লোডিং হচ্ছে...",
                upload_reels: "রিল আপলোড চালু রাখুন",
                notifications: "বিজ্ঞপ্তি/নোটিফিকেশন",
                fetching: "ফিড প্রস্তুত করা হচ্ছে...",
                share: "শেয়ার"
            }
        };

        function showToast(message) {
            const toast = document.getElementById('custom-toast');
            const toastText = document.getElementById('toast-text');
            toastText.innerHTML = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
            }, 2500);
        }

        async function fetchLanguageAndVideos() {
            try {
                const res = await fetch(`/api/user/lang?userId=${currentUser.id}`);
                const data = await res.json();
                appLang = data.lang || "en";
            } catch (err) {
                console.error("Lang fetch failed", err);
            }
            document.getElementById('loaderText').innerText = uiStrings[appLang].fetching;
            fetchVideos();
        }

        function formatCaption(text) {
            if (!text) return "";
            // If text contains HTML tags (such as Ads injected from API), render directly
            if (text.includes('<a') || text.includes('<strong') || text.includes('<b>')) {
                return text;
            }
            
            let safeText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            safeText = safeText.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" class="caption-link" onclick="event.stopPropagation();">${url}</a>`;
            });

            const mentionRegex = /@([a-zA-Z0-9_]{5,32})/g;
            safeText = safeText.replace(mentionRegex, function(mention, username) {
                return `<a href="https://t.me/${username}" target="_blank" class="caption-link" onclick="event.stopPropagation();">${mention}</a>`;
            });

            safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            safeText = safeText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');

            return safeText;
        }

        async function fetchVideos() {
            try {
                let seenVideos = JSON.parse(localStorage.getItem('seen_videos') || '[]');
                const response = await fetch('/api/videos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, seenVideos: seenVideos })
                });
                
                const data = await response.json();
                if (data.wasReset) {
                    localStorage.setItem('seen_videos', '[]');
                }
                
                videos = data.videos || [];

                videos.sort((a, b) => {
                    const dateA = a.timestamp ? new Date(a.timestamp) : parseInt(a.id) || 0;
                    const dateB = b.timestamp ? new Date(b.timestamp) : parseInt(b.id) || 0;
                    return dateB - dateA;
                });

                const startParam = tg?.initDataUnsafe?.start_param;
                if (startParam) {
                    const matchedIndex = videos.findIndex(v => String(v.id) === String(startParam));
                    if (matchedIndex !== -1) {
                        const matchedVideo = videos.splice(matchedIndex, 1)[0];
                        videos.unshift(matchedVideo);
                    }
                }

                renderVideos();
            } catch (err) {
                console.error("Failed to load videos", err);
                hideLoader();
            }
        }

        function renderVideos() {
            if (videos.length === 0) {
                container.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100vh;">No videos available.</div>`;
                hideLoader();
                return;
            }

            const str = uiStrings[appLang];
            document.getElementById('txt-upload').innerText = str.upload_reels;
            document.getElementById('txt-notify').innerText = str.notifications;

            container.innerHTML = videos.map((video, index) => {
                const streamUrl = `/api/video/stream/${encodeURIComponent(video.fileId)}`;
                const isLiked = localStorage.getItem(`liked_${video.id}`) === 'true';
                const isSaved = localStorage.getItem(`saved_${video.id}`) === 'true';
                const uploaderName = video.uploaderName || "@reelsuploder";
                const uploaderPic = video.uploaderPic || "https://via.placeholder.com/150";

                const isOfficial = uploaderName.toLowerCase().includes("reelsuploder") || 
                                   uploaderName.toLowerCase().includes("reelsuploader") || 
                                   video.uploaderId === "reelsuploder" || 
                                   video.uploaderId === "-1002241516027";

                return `
                    <div class="reel" id="reel-${video.id}" data-index="${index}">
                        <div class="loading">${str.loading}</div>
                        
                        <div class="play-indicator">
                            <svg viewBox="0 0 24 24" width="36" height="36" fill="#fff">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>

                        <video data-src="${streamUrl}" loop playsinline webkit-playsinline preload="none" onloadedmetadata="videoLoaded(this)" onclick="togglePlay(this)" onended="markAsWatched('${video.id}')"></video>
                        
                        <div class="heart-pop" id="heart-pop-${video.id}">
                            <svg viewBox="0 0 24 24" width="70" height="70" fill="currentColor">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </div>

                        <div class="overlay">
                            <div class="video-details">
                                <div class="uploader-info" onclick="openProfileModal('${currentUser.id}', '${currentUser.username}', '${currentUser.photo}')">
                                    <img src="${currentUser.photo}" alt="${currentUser.username}">
                                    <h3>${currentUser.username} (You)</h3>
                                </div>
                                <p>${formatCaption(video.caption) || str.no_caption}</p>
                            </div>

                            <div class="actions-panel">
                                <!-- Profile Photo above Love Reaction with Blue Check Badges support -->
                                <div class="uploader-panel-pic-wrapper" onclick="handleUploaderClick('${video.uploaderId}', '${uploaderName}', '${uploaderPic}', '${video.formattedSize || "Unknown Size"}', '${video.formattedDate || "Unknown Date"}', '${video.views || 0}', '${video.id}')">
                                    <div class="uploader-panel-pic">
                                        <img src="${uploaderPic}" alt="${uploaderName}">
                                    </div>
                                    ${isOfficial ? `<div class="verified-badge">✓</div>` : ''}
                                </div>

                                <button class="action-button ${isLiked ? 'liked' : ''}" onclick="toggleLike('${video.id}', event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                        </svg>
                                    </div>
                                    <span id="like-count-${video.id}">${video.likes || 0}</span>
                                </button>

                                <button class="action-button ${isSaved ? 'saved' : ''}" onclick="toggleSave('${video.id}', event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                                        </svg>
                                    </div>
                                    <span>${str.save}</span>
                                </button>

                                <button class="action-button" onclick="shareVideo('${video.id}', event)">
                                    <div class="action-icon" style="background: rgba(49, 130, 206, 0.2);">
                                        <svg viewBox="0 0 24 24" style="color: #3182ce;">
                                            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                                        </svg>
                                    </div>
                                    <span style="color: #3182ce;">${str.share}</span>
                                </button>

                                <button class="action-button" onclick="refreshFeed(event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
                                        </svg>
                                    </div>
                                    <span>${str.refresh}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updateVideoSources(0);
            setupIntersectionObserver();
            setupDoubleTap();
        }

        function updateVideoSources(currentIndex) {
            const reels = document.querySelectorAll('.reel');
            reels.forEach((reel, i) => {
                const video = reel.querySelector('video');
                if (!video) return;
                const realSrc = video.getAttribute('data-src');

                if (i >= currentIndex - 1 && i <= currentIndex + 1) {
                    if (!video.src || video.src === "" || !video.src.includes(realSrc)) {
                        video.src = realSrc;
                        video.load();
                    }
                } else {
                    if (video.src && video.src !== "") {
                        video.pause();
                        video.removeAttribute('src'); 
                        video.load();
                        video.classList.remove('loaded');
                        const loadingText = reel.querySelector('.loading');
                        if (loadingText) loadingText.style.display = 'block';
                    }
                }
            });
        }

        function videoLoaded(videoElement) {
            videoElement.classList.add('loaded');
            const loadingText = videoElement.parentElement.querySelector('.loading');
            if (loadingText) loadingText.style.display = 'none';
            
            const reelParent = videoElement.closest('.reel');
            if (reelParent && parseInt(reelParent.getAttribute('data-index')) === activeIndex) {
                hideLoader();
                // Forced smooth instant autoplay on load
                videoElement.play().catch(() => {
                    videoElement.muted = true;
                    videoElement.play().catch(e => console.log("Blocked", e));
                });
            }
        }

        function hideLoader() {
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.visibility = 'hidden'; }, 300);
            }
        }

        function togglePlay(video) {
            const playIndicator = video.parentElement.querySelector('.play-indicator');
            if (video.paused) {
                video.play().then(() => {
                    if (playIndicator) playIndicator.classList.remove('show');
                }).catch(() => {});
            } else {
                video.pause();
                if (playIndicator) {
                    playIndicator.classList.add('show');
                }
            }
        }

        async function toggleLike(videoId, event) {
            if (event) event.stopPropagation();
            const likeBtn = document.querySelector(`#reel-${videoId} .action-button`);
            const likeCountSpan = document.getElementById(`like-count-${videoId}`);
            const isLiked = likeBtn.classList.contains('liked');
            let currentLikes = parseInt(likeCountSpan.innerText);

            const newLikedState = !isLiked;
            if (newLikedState) {
                likeBtn.classList.add('liked');
                likeCountSpan.innerText = currentLikes + 1;
                localStorage.setItem(`liked_${videoId}`, 'true');
            } else {
                likeBtn.classList.remove('liked');
                likeCountSpan.innerText = Math.max(0, currentLikes - 1);
                localStorage.removeItem(`liked_${videoId}`);
            }

            try {
                await fetch('/api/video/like', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, isLiked: newLikedState, userId: currentUser.id, username: currentUser.username })
                });
            } catch (err) { console.error(err); }
        }

        async function toggleSave(videoId, event) {
            if (event) event.stopPropagation();
            const saveBtn = document.querySelector(`#reel-${videoId} .action-button:has(svg path[d*="M17 3H7"])`) || event.currentTarget;
            const isSaved = saveBtn.classList.contains('saved');
            const newSavedState = !isSaved;

            if (newSavedState) {
                saveBtn.classList.add('saved');
                localStorage.setItem(`saved_${videoId}`, 'true');
            } else {
                saveBtn.classList.remove('saved');
                localStorage.removeItem(`saved_${videoId}`);
            }

            try {
                await fetch('/api/video/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id, isSaved: newSavedState })
                });
            } catch (err) { console.error(err); }
        }

        // Updated shared URL matching specifically: https://t.me/SnapSavingBot/reels
        function shareVideo(videoId, event) {
            if (event) event.stopPropagation();
            
            const shareUrl = `https://t.me/SnapSavingBot/reels?startapp=${videoId}`;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast("Link copied! Opening Telegram...");
                setTimeout(() => {
                    const tgText = encodeURIComponent("Check out this awesome Reel on SnapSaving! 🎥");
                    const tgShareLink = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${tgText}`;
                    if (tg) {
                        tg.openTelegramLink(tgShareLink);
                    } else {
                        window.open(tgShareLink, '_blank');
                    }
                }, 800);
            }).catch(() => {
                const tgText = encodeURIComponent("Check out this awesome Reel on SnapSaving! 🎥");
                const tgShareLink = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${tgText}`;
                if (tg) {
                    tg.openTelegramLink(tgShareLink);
                } else {
                    window.open(tgShareLink, '_blank');
                }
            });
        }

        // Handle profile interactions (Official badge toast vs popup page load)
        function handleUploaderClick(uploaderId, uploaderName, uploaderPic, size, date, views, videoId) {
            const isOfficial = uploaderName.toLowerCase().includes("reelsuploder") || 
                               uploaderName.toLowerCase().includes("reelsuploader") || 
                               uploaderId === "reelsuploder" || 
                               uploaderId === "-1002241516027";

            if (isOfficial) {
                showToast(`Official Reels Uploader Channel <span style="color:#1da1f2; font-weight:bold; margin-left:4px;">✔️</span>`);
                return;
            }

            // Open popup sheet containing video specs and options
            document.getElementById('upModalPic').src = uploaderPic;
            document.getElementById('upModalName').innerText = uploaderName;
            document.getElementById('upModalSize').innerText = size || "Unknown Size";
            document.getElementById('upModalDate').innerText = date || "Unknown Date";
            document.getElementById('upModalViews').innerText = views || "0";

            // Open external TG link on click
            const btnOpenProfile = document.getElementById('btnOpenTgProfile');
            btnOpenProfile.onclick = function() {
                const cleanUsername = uploaderName.replace('@', '');
                const profileLink = `https://t.me/${cleanUsername}`;
                if (tg) {
                    tg.openTelegramLink(profileLink);
                } else {
                    window.open(profileLink, '_blank');
                }
            };

            // Setup report options inside sheet
            const btnReport = document.getElementById('btnReportVideoInSheet');
            btnReport.onclick = function() {
                closeUploaderSheet();
                reportVideo(videoId);
            };

            document.getElementById('uploaderSheet').classList.add('open');
        }

        function closeUploaderSheet() {
            document.getElementById('uploaderSheet').classList.remove('open');
        }

        async function reportVideo(videoId) {
            const confirmMsg = appLang === "bn" ? "রিপোর্ট করতে চান?" : "Do you want to report this?";
            if (!confirm(confirmMsg)) return;

            try {
                await fetch('/api/video/report', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id, username: currentUser.username })
                });
                showToast(appLang === "bn" ? "রিপোর্ট সফল হয়েছে" : "Reported successfully");
            } catch (err) { console.error(err); }
        }

        function markAsWatched(videoId) {
            let seenVideos = JSON.parse(localStorage.getItem('seen_videos') || '[]');
            if (!seenVideos.includes(videoId)) {
                seenVideos.push(videoId);
                localStorage.setItem('seen_videos', JSON.stringify(seenVideos));
            }
        }

        async function trackView(videoId) {
            try {
                await fetch('/api/video/view', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id })
                });
            } catch (err) { console.error(err); }
        }

        function refreshFeed(event) {
            if (event) event.stopPropagation();
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.visibility = 'visible';
                loader.style.opacity = '1';
            }
            fetchVideos();
        }

        function setupIntersectionObserver() {
            const observerOptions = { root: container, threshold: 0.6 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const videoId = entry.target.id.replace('reel-', '');
                    const index = parseInt(entry.target.getAttribute('data-index'));
                    const playIndicator = entry.target.querySelector('.play-indicator');

                    if (video) {
                        if (entry.isIntersecting) {
                            activeIndex = index;
                            updateVideoSources(activeIndex);
                            if (playIndicator) playIndicator.classList.remove('show');
                            video.play().then(() => trackView(videoId)).catch(() => {
                                video.muted = true;
                                video.play().catch(() => {});
                            });
                        } else {
                            video.pause();
                            if (playIndicator) playIndicator.classList.remove('show');
                        }
                    }
                });
            }, observerOptions);
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function setupDoubleTap() {
            document.querySelectorAll('.reel').forEach(reel => {
                let lastTap = 0;
                reel.addEventListener('click', function(e) {
                    if (e.target.classList.contains('caption-link')) return;

                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    if (tapLength < 300 && tapLength > 0) {
                        const videoId = reel.id.replace('reel-', '');
                        const heartPop = document.getElementById(`heart-pop-${videoId}`);
                        heartPop.classList.add('pop-active');
                        setTimeout(() => heartPop.classList.remove('pop-active'), 700);
                        const likeBtn = reel.querySelector('.action-button');
                        if (!likeBtn.classList.contains('liked')) toggleLike(videoId);
                    }
                    lastTap = currentTime;
                });
            });
        }

        let activeProfileUserId = null;
        async function openProfileModal(uploaderId, uploaderName, uploaderPic) {
            activeProfileUserId = uploaderId;
            document.getElementById('modalProfileName').innerText = uploaderName;
            document.getElementById('modalProfilePic').src = uploaderPic;

            let uploadingVal = true;
            let notificationVal = true;

            try {
                const res = await fetch(`/api/user/settings?userId=${uploaderId}`);
                if (res.ok) {
                    const settings = await res.json();
                    uploadingVal = settings.uploadingReels !== false;
                    notificationVal = settings.notifications !== false;
                }
            } catch (err) {
                uploadingVal = localStorage.getItem(`setting_upload_${uploaderId}`) !== 'false';
                notificationVal = localStorage.getItem(`setting_notify_${uploaderId}`) !== 'false';
            }

            document.getElementById('uploadToggle').checked = uploadingVal;
            document.getElementById('notificationToggle').checked = notificationVal;

            if (uploaderId !== currentUser.id) {
                document.getElementById('uploadToggle').disabled = true;
                document.getElementById('notificationToggle').disabled = true;
            } else {
                document.getElementById('uploadToggle').disabled = false;
                document.getElementById('notificationToggle').disabled = false;
            }
            document.getElementById('profileModal').classList.add('open');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('open');
        }

        async function updateProfileSetting() {
            if (activeProfileUserId !== currentUser.id) return;
            const uploadingVal = document.getElementById('uploadToggle').checked;
            const notificationVal = document.getElementById('notificationToggle').checked;

            localStorage.setItem(`setting_upload_${currentUser.id}`, uploadingVal);
            localStorage.setItem(`setting_notify_${currentUser.id}`, notificationVal);

            try {
                await fetch('/api/user/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: currentUser.id,
                        uploadingReels: uploadingVal,
                        notifications: notificationVal
                    })
                });
                showToast("Preferences Updated Successfully");
            } catch (err) {
                console.error("Failed to sync settings", err);
            }
        }

        fetchLanguageAndVideos();
    </script>
