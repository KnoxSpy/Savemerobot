<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reels</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            inset: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-text-size-adjust: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        /* App Loading Screen */
        #app-loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
        }

        .tiktok-style-logo {
            width: 90px;
            height: 90px;
            animation: pulseGlow 1.6s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.92); filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(254, 9, 121, 0.8)); }
            100% { transform: scale(0.92); filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.6)); }
        }

        .loader-text {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* High-Performance Container with GPU Acceleration */
        .reels-container {
            height: 100%;
            width: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
            transform: translate3d(0, 0, 0);
            will-change: scroll-position;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .reels-container::-webkit-scrollbar {
            display: none;
        }

        .reel {
            position: relative;
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            will-change: transform;
        }

        /* Top & Bottom Vignette Overlay for contrast */
        .vignette-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 62%, rgba(0,0,0,0.92) 100%);
            pointer-events: none;
            z-index: 2;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transform: scale(1);
            transform-origin: center center;
            touch-action: pan-y;
            transition: opacity 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            image-rendering: -webkit-optimize-contrast;
            background-color: #000;
        }

        video.loaded {
            opacity: 1;
        }

        /* Play/Pause Central Indicator Overlay */
        .play-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 72px; height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 8;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-indicator.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Overlay Interface Layer */
        .overlay {
            position: absolute;
            bottom: var(--bar-offset, 148px);
            left: 0;
            width: 100%;
            padding: 80px 16px 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 5;
            transition: bottom 0.2s ease;
        }

        .video-details {
            max-width: 68%;
            color: #fff;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .uploader-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            width: fit-content;
        }

        .uploader-info img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .uploader-info h3 {
            font-size: 14.5px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        .video-details p {
            font-size: 13px;
            opacity: 0.95;
            line-height: 1.4;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            max-height: 90px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .video-details p::-webkit-scrollbar {
            display: none;
        }

        .caption-link {
            color: #3182ce;
            text-decoration: none;
            font-weight: 700;
            pointer-events: auto;
        }

        /* Actions Panel */
        .actions-panel {
            display: flex;
            flex-direction: column;
            gap: 13px;
            align-items: center;
            pointer-events: auto;
            margin-bottom: 4px;
        }

        .action-button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10.5px;
            font-weight: 600;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .action-button:active {
            transform: scale(0.85);
        }

        .action-icon {
            width: 39px;
            height: 39px;
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .action-button:hover .action-icon {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .uploader-panel-pic-wrapper {
            position: relative;
            width: 46px; height: 46px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .uploader-panel-pic {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #00f2fe 0%, #fe0979 100%);
            padding: 2.5px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(254, 9, 121, 0.3);
            transition: transform 0.2s ease;
        }

        .uploader-panel-pic:active {
            transform: scale(0.9);
        }

        .uploader-panel-pic img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #000;
        }

        .verified-badge {
            position: absolute;
            bottom: -1px; right: -1px;
            width: 15px; height: 15px;
            background: #1da1f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #000;
            color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .verified-badge svg { width: 9px; height: 9px; }

        .action-button.liked .action-icon {
            background: #fe0979;
            border-color: #fe0979;
            filter: drop-shadow(0 0 8px rgba(254, 9, 121, 0.6));
        }

        .action-icon svg {
            width: 18px; height: 18px;
            fill: currentColor;
        }

        /* 3D Elastic Heart Pop */
        .heart-pop {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #fe0979;
            filter: drop-shadow(0 0 20px rgba(254, 9, 121, 0.9));
            pointer-events: none;
            z-index: 10;
        }

        @keyframes heartPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.3) rotate(10deg); opacity: 0.95; }
            30% { transform: translate(-50%, -50%) scale(0.9) rotate(-5deg); opacity: 0.95; }
            45% { transform: translate(-50%, -50%) scale(1.05) rotate(0deg); opacity: 0.95; }
            80% { transform: translate(-50%, -50%) scale(1.02); opacity: 0.85; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        .pop-active {
            animation: heartPop 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .loading {
            position: absolute;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 3;
        }

        /* ===================== Fixed Bottom Bar: Own profile + Ads ===================== */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            z-index: 60;
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px)) 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.97) 35%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: flex;
            flex-direction: column;
            gap: 9px;
            pointer-events: auto;
        }

        .own-profile-row {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            width: fit-content;
            max-width: 100%;
        }

        .own-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.9);
            flex-shrink: 0;
        }

        .own-name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .own-settings-icon {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .own-settings-icon:active {
            transform: scale(0.88);
            background: rgba(255,255,255,0.2);
        }

        .own-settings-icon svg {
            width: 14px; height: 14px;
            fill: rgba(255,255,255,0.85);
        }

        .ads-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ads-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .ad-banner-placeholder {
            width: 100%;
            min-height: 52px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            font-weight: 600;
        }

        .ad-banner-placeholder svg {
            width: 16px; height: 16px;
            fill: rgba(255,255,255,0.3);
        }

        /* ===================== Bottom Sheet Popup Styles ===================== */
        .bottom-sheet {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1000;
            visibility: hidden;
            transition: visibility 0.3s;
        }

        .bottom-sheet.open {
            visibility: visible;
        }

        .sheet-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .bottom-sheet.open .sheet-overlay {
            opacity: 1;
        }

        .sheet-content {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            background: rgba(16, 16, 18, 0.92);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top-left-radius: 26px;
            border-top-right-radius: 26px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 22px 22px calc(22px + env(safe-area-inset-bottom, 0px)) 22px;
            color: #fff;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .bottom-sheet.open .sheet-content {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .sheet-drag-handle {
            width: 38px; height: 4.5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .profile-popup-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .profile-popup-info img {
            width: 78px; height: 78px;
            border-radius: 50%;
            border: 2.5px solid #fe0979;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(254, 9, 121, 0.4);
        }

        .profile-popup-info h4 {
            font-size: 16.5px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 13.5px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px; height: 25px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .25s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 17px; width: 17px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .25s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #38a169; }
        input:checked + .slider:before { transform: translateX(19px); }

        /* ===== Professional Uploader Sheet ===== */
        .uploader-avatar-wrap {
            position: relative;
            width: 84px; height: 84px;
        }

        .uploader-avatar-wrap img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2.5px solid transparent;
            background: linear-gradient(45deg, #00f2fe, #fe0979) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            object-fit: cover;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        .verified-badge-lg {
            position: absolute;
            bottom: 0; right: 0;
            width: 22px; height: 22px;
            background: #1da1f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2.5px solid #101012;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        .verified-badge-lg svg { width: 11px; height: 11px; fill: #fff; }

        .open-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: none;
            outline: none;
            cursor: pointer;
            background: linear-gradient(45deg, #00f2fe, #3182ce);
            color: #fff;
            font-weight: 700;
            font-size: 13.5px;
            border-radius: 14px;
            padding: 13px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .open-chat-btn:active { transform: scale(0.97); }
        .open-chat-btn svg { width: 16px; height: 16px; fill: #fff; }

        .dual-action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dual-action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            border-radius: 14px;
            padding: 13px 8px;
            font-size: 12.5px;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .dual-action-btn:active { transform: scale(0.96); }
        .dual-action-btn svg { width: 19px; height: 19px; fill: currentColor; }

        .dual-action-btn.save-btn { color: #00f2fe; }
        .dual-action-btn.save-btn.active {
            background: rgba(0, 242, 254, 0.14);
            border-color: rgba(0, 242, 254, 0.35);
            filter: drop-shadow(0 0 6px rgba(0, 242, 254, 0.35));
        }

        .dual-action-btn.report-btn { color: #fe0979; }
        .dual-action-btn.report-btn:hover,
        .dual-action-btn.report-btn:active {
            background: rgba(254, 9, 121, 0.12);
            border-color: rgba(254, 9, 121, 0.3);
        }

        .video-info-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 13px 16px;
            border-radius: 13px;
            font-size: 13px;
        }

        .info-label { color: rgba(255,255,255,0.55); font-weight: 500; }
        .info-value { color: #fff; font-weight: 600; }

        /* Custom Toast Notification */
        #custom-toast {
            position: fixed;
            bottom: 220px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(25, 25, 25, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 13.5px;
            font-weight: 600;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.35s ease;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <!-- Animated Loader Screen -->
    <div id="app-loader">
        <svg class="tiktok-style-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.589 12.55c-1.8 0-3.45-.69-4.7-1.83V17c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c.3 0 .59.03.88.08V13.2c-.29-.07-.58-.1-.88-.1-2.15 0-3.9 1.75-3.9 3.9s1.75 3.9 3.9 3.9 3.9-1.75 3.9-3.9v-13h2.12c.38 2.61 2.63 4.65 5.37 4.65V6.45c-1.42 0-2.63-.84-3.2-2.05H14.19v9.12c1.07.65 2.33 1.03 3.69 1.03h1.71v-2h-1.71z" fill="#00f2fe"/>
            <path d="M19.589 11.55c-1.8 0-3.45-.69-4.7-1.83V16c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c.3 0 .59.03.88.08V12.2c-.29-.07-.58-.1-.88-.1-2.15 0-3.9 1.75-3.9 3.9s1.75 3.9 3.9 3.9 3.9-1.75 3.9-3.9v-13h2.12c.38 2.61 2.63 4.65 5.37 4.65V5.45c-1.42 0-2.63-.84-3.2-2.05H14.19v9.12c1.07.65 2.33 1.03 3.69 1.03h1.71v-2h-1.71z" fill="#fe0979" style="mix-blend-mode: screen;"/>
        </svg>
        <div class="loader-text" id="loaderText">Loading Videos...</div>
    </div>

    <!-- Container for dynamic reels -->
    <div class="reels-container" id="reelsContainer"></div>

    <!-- Fixed bottom bar: own profile + ads -->
    <div class="bottom-bar" id="bottomBar">
        <div class="own-profile-row" onclick="openProfileModal(currentUser.id, currentUser.username, currentUser.photo)">
            <img class="own-avatar" id="ownAvatarImg" src="" alt="">
            <span class="own-name" id="ownNameText"></span>
            <span class="own-settings-icon" onclick="event.stopPropagation(); openProfileModal(currentUser.id, currentUser.username, currentUser.photo)">
                <svg viewBox="0 0 24 24">

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const currentUser = {
            id: tg?.initDataUnsafe?.user?.id || "demo_user_123",
            username: tg?.initDataUnsafe?.user?.username || "Guest_User",
            photo: tg?.initDataUnsafe?.user?.photo_url || "https://via.placeholder.com/150"
        };

        let videos = [];
        let appLang = "en";
        let activeIndex = 0;
        let activeVideoId = null;
        const container = document.getElementById('reelsContainer');

        const uiStrings = {
            en: {
                save: "Save Video",
                saved: "Saved",
                refresh: "Refresh",
                report: "Report Video",
                no_caption: "No caption provided.",
                loading: "Loading...",
                upload_reels: "Reels Upload Syncing",
                notifications: "Notifications",
                fetching: "Preparing Feed...",
                share: "Share",
                openChat: "Open Chat",
                ads: "Ads",
                size: "Video Size",
                date: "Upload Date",
                views: "Views"
            },
            bn: {
                save: "ভিডিও সেভ করুন",
                saved: "সেভ করা হয়েছে",
                refresh: "রিফ্রেশ",
                report: "রিপোর্ট করুন",
                no_caption: "কোনো ক্যাপশন দেওয়া হয়নি।",
                loading: "লোডিং হচ্ছে...",
                upload_reels: "রিল আপলোড চালু রাখুন",
                notifications: "বিজ্ঞপ্তি/নোটিফিকেশন",
                fetching: "ফিড প্রস্তুত করা হচ্ছে...",
                share: "শেয়ার",
                openChat: "চ্যাট খুলুন",
                ads: "বিজ্ঞাপন",
                size: "ভিডিও সাইজ",
                date: "আপলোড তারিখ",
                views: "ভিউ"
            }
        };

        function showToast(message) {
            const toast = document.getElementById('custom-toast');
            const toastText = document.getElementById('toast-text');
            toastText.innerHTML = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
            }, 2500);
        }

        function applyOwnProfileBar() {
            document.getElementById('ownAvatarImg').src = currentUser.photo;
            document.getElementById('ownNameText').innerText = currentUser.username;
        }

        function applyStaticStrings() {
            const str = uiStrings[appLang];
            document.getElementById('adsLabel').innerText = str.ads;
            document.getElementById('txt-upload').innerText = str.upload_reels;
            document.getElementById('txt-notify').innerText = str.notifications;
            document.getElementById('openChatLabel').innerText = str.openChat;
            document.getElementById('reportVideoLabel').innerText = str.report;
            document.getElementById('lbl-size').innerText = str.size;
            document.getElementById('lbl-date').innerText = str.date;
            document.getElementById('lbl-views').innerText = str.views;
        }

        async function fetchLanguageAndVideos() {
            try {
                const res = await fetch(`/api/user/lang?userId=${currentUser.id}`);
                const data = await res.json();
                appLang = data.lang || "en";
            } catch (err) {
                console.error("Lang fetch failed", err);
            }
            document.getElementById('loaderText').innerText = uiStrings[appLang].fetching;
            applyOwnProfileBar();
            applyStaticStrings();
            fetchVideos();
        }

        function formatCaption(text) {
            if (!text) return "";
            if (text.includes('<a') || text.includes('<strong') || text.includes('<b>')) {
                return text;
            }

            let safeText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            safeText = safeText.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" class="caption-link" onclick="event.stopPropagation();">${url}</a>`;
            });

            const mentionRegex = /@([a-zA-Z0-9_]{5,32})/g;
            safeText = safeText.replace(mentionRegex, function(mention, username) {
                return `<a href="https://t.me/${username}" target="_blank" class="caption-link" onclick="event.stopPropagation();">${mention}</a>`;
            });

            safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            safeText = safeText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');

            return safeText;
        }

        async function fetchVideos() {
            try {
                let seenVideos = JSON.parse(localStorage.getItem('seen_videos') || '[]');
                const response = await fetch('/api/videos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, seenVideos: seenVideos })
                });

                const data = await response.json();
                if (data.wasReset) {
                    localStorage.setItem('seen_videos', '[]');
                }

                videos = data.videos || [];

                videos.sort((a, b) => {
                    const dateA = a.timestamp ? new Date(a.timestamp) : parseInt(a.id) || 0;
                    const dateB = b.timestamp ? new Date(b.timestamp) : parseInt(b.id) || 0;
                    return dateB - dateA;
                });

                const startParam = tg?.initDataUnsafe?.start_param;
                if (startParam) {
                    const matchedIndex = videos.findIndex(v => String(v.id) === String(startParam));
                    if (matchedIndex !== -1) {
                        const matchedVideo = videos.splice(matchedIndex, 1)[0];
                        videos.unshift(matchedVideo);
                    }
                }

                renderVideos();
            } catch (err) {
                console.error("Failed to load videos", err);
                hideLoader();
            }
        }

        function renderVideos() {
            if (videos.length === 0) {
                container.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%;">No videos available.</div>`;
                hideLoader();
                return;
            }

            const str = uiStrings[appLang];

            container.innerHTML = videos.map((video, index) => {
                const streamUrl = `/api/video/stream/${encodeURIComponent(video.fileId)}`;
                const isLiked = localStorage.getItem(`liked_${video.id}`) === 'true';
                const uploaderName = video.uploaderName || "@reelsuploder";
                const uploaderPic = video.uploaderPic || "https://via.placeholder.com/150";

                const isOfficial = uploaderName.toLowerCase().includes("reelsuploder") ||
                                   uploaderName.toLowerCase().includes("reelsuploader") ||
                                   video.uploaderId === "reelsuploder" ||
                                   video.uploaderId === "-1002241516027";

                return `
                    <div class="reel" id="reel-${video.id}" data-index="${index}">
                        <div class="vignette-overlay"></div>
                        <div class="loading">${str.loading}</div>

                        <div class="play-indicator">
                            <svg viewBox="0 0 24 24" width="36" height="36" fill="#fff">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>

                        <video data-src="${streamUrl}" loop playsinline webkit-playsinline preload="none" onloadedmetadata="videoLoaded(this)" onclick="togglePlay(this)" onended="markAsWatched('${video.id}')"></video>

                        <div class="heart-pop" id="heart-pop-${video.id}">
                            <svg viewBox="0 0 24 24" width="90" height="90" fill="currentColor">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </div>

                        <div class="overlay">
                            <!-- Left Info Panel: dynamic uploader info -->
                            <div class="video-details">
                                <div class="uploader-info" onclick="handleUploaderClick('${video.uploaderId}', '${uploaderName}', '${uploaderPic}', '${video.formattedSize || "Unknown Size"}', '${video.formattedDate || "Unknown Date"}', '${video.views || 0}', '${video.id}')">
                                    <img src="${uploaderPic}" alt="${uploaderName}">
                                    <h3>${uploaderName}</h3>
                                    ${isOfficial ? `<div class="verified-badge" style="position:static; margin-left:4px;"><svg viewBox="0 0 24 24" fill="#fff"><path d="M9 16.2l-3.5-3.5-1.4 1.4L9 19 20 8l-1.4-1.4z"/></svg></div>` : ''}
                                </div>
                                <p>${formatCaption(video.caption) || str.no_caption}</p>
                            </div>

                            <div class="actions-panel">
                                <!-- Uploader profile picture (opens uploader popup) -->
                                <div class="uploader-panel-pic-wrapper" onclick="handleUploaderClick('${video.uploaderId}', '${uploaderName}', '${uploaderPic}', '${video.formattedSize || "Unknown Size"}', '${video.formattedDate || "Unknown Date"}', '${video.views || 0}', '${video.id}')">
                                    <div class="uploader-panel-pic">
                                        <img src="${uploaderPic}" alt="${uploaderName}">
                                    </div>
                                    ${isOfficial ? `<div class="verified-badge"><svg viewBox="0 0 24 24" fill="#fff"><path d="M9 16.2l-3.5-3.5-1.4 1.4L9 19 20 8l-1.4-1.4z"/></svg></div>` : ''}
                                </div>

                                <button class="action-button ${isLiked ? 'liked' : ''}" onclick="toggleLike('${video.id}', event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                        </svg>
                                    </div>
                                    <span id="like-count-${video.id}">${video.likes || 0}</span>
                                </button>

                                <button class="action-button" onclick="shareVideo('${video.id}', event)">
                                    <div class="action-icon" style="background: rgba(0, 242, 254, 0.15); color: #00f2fe; border-color: rgba(0, 242, 254, 0.25);">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                                        </svg>
                                    </div>
                                    <span style="color: #00f2fe;">${str.share}</span>
                                </button>

                                <button class="action-button" onclick="refreshFeed(event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
                                        </svg>
                                    </div>
                                    <span>${str.refresh}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updateVideoSources(0);
            setupIntersectionObserver();
            setupDoubleTap();
            setupPinchZoom();
            adjustOverlayOffset();
        }

        // Position the per-video overlay just above the fixed bottom bar
        function adjustOverlayOffset() {
            const bar = document.getElementById('bottomBar');
            if (!bar) return;
            const offset = bar.offsetHeight + 14;
            document.documentElement.style.setProperty('--bar-offset', `${offset}px`);
        }
        window.addEventListener('resize', adjustOverlayOffset);

        // Optimized Autoplay sound workaround on user touch
        function forceUnmuteActiveVideo() {
            const currentVideo = document.querySelector(`.reel[data-index="${activeIndex}"] video`);
            if (currentVideo && currentVideo.muted) {
                currentVideo.muted = false;
            }
        }
        document.addEventListener('touchstart', forceUnmuteActiveVideo, { once: true });
        document.addEventListener('click', forceUnmuteActiveVideo, { once: true });

        function updateVideoSources(currentIndex) {
            const reels = document.querySelectorAll('.reel');
            reels.forEach((reel, i) => {
                const video = reel.querySelector('video');
                if (!video) return;
                const realSrc = video.getAttribute('data-src');

                if (i >= currentIndex - 1 && i <= currentIndex + 1) {
                    if (!video.src || video.src === "" || !video.src.includes(realSrc)) {
                        video.src = realSrc;
                        video.load();
                    }
                } else {
                    if (video.src && video.src !== "") {
                        video.pause();
                        video.removeAttribute('src');
                        video.load();
                        video.classList.remove('loaded');
                        video.style.transform = 'scale(1)';
                        video.dataset.scale = 1;
                        const loadingText = reel.querySelector('.loading');
                        if (loadingText) loadingText.style.display = 'block';
                    }
                }
            });
        }

        function videoLoaded(videoElement) {
            videoElement.classList.add('loaded');
            const loadingText = videoElement.parentElement.querySelector('.loading');
            if (loadingText) loadingText.style.display = 'none';

            const reelParent = videoElement.closest('.reel');
            if (reelParent && parseInt(reelParent.getAttribute('data-index')) === activeIndex) {
                hideLoader();
                // Ensure instant smooth autoplay with sound fallback
                videoElement.muted = false;
                videoElement.play().catch(() => {
                    videoElement.muted = true;
                    videoElement.play().catch(() => {});
                });
            }
        }

        function hideLoader() {
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.visibility = 'hidden'; }, 400);
            }
        }

        function togglePlay(video) {
            video.muted = false; // Unmute on explicit user interaction
            const playIndicator = video.parentElement.querySelector('.play-indicator');
            if (video.paused) {
                video.play().then(() => {
                    if (playIndicator) playIndicator.classList.remove('show');
                }).catch(() => {});
            } else {
                video.pause();
                if (playIndicator) {
                    playIndicator.classList.add('show');
                }
            }
        }

        async function toggleLike(videoId, event) {
            if (event) event.stopPropagation();
            const likeBtn = document.querySelector(`#reel-${videoId} .action-button`);
            const likeCountSpan = document.getElementById(`like-count-${videoId}`);
            const isLiked = likeBtn.classList.contains('liked');
            let currentLikes = parseInt(likeCountSpan.innerText);

            const newLikedState = !isLiked;
            if (newLikedState) {
                likeBtn.classList.add('liked');
                likeCountSpan.innerText = currentLikes + 1;
                localStorage.setItem(`liked_${videoId}`, 'true');
            } else {
                likeBtn.classList.remove('liked');
                likeCountSpan.innerText = Math.max(0, currentLikes - 1);
                localStorage.removeItem(`liked_${videoId}`);
            }

            try {
                await fetch('/api/video/like', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, isLiked: newLikedState, userId: currentUser.id, username: currentUser.username })
                });
            } catch (err) { console.error(err); }
        }

        // Save now lives inside the uploader/video-info popup
        function refreshSaveButtonUI(videoId) {
            const str = uiStrings[appLang];
            const isSaved = localStorage.getItem(`saved_${videoId}`) === 'true';
            const saveBtn = document.getElementById('btnSaveVideoInSheet');
            const saveLabel = document.getElementById('saveVideoLabel');
            if (!saveBtn) return;
            saveBtn.classList.toggle('active', isSaved);
            saveLabel.innerText = isSaved ? str.saved : str.save;
        }

        async function toggleSave(videoId) {
            const isSaved = localStorage.getItem(`saved_${videoId}`) === 'true';
            const newSavedState = !isSaved;

            if (newSavedState) {
                localStorage.setItem(`saved_${videoId}`, 'true');
            } else {
                localStorage.removeItem(`saved_${videoId}`);
            }

            refreshSaveButtonUI(videoId);
            showToast(newSavedState ? "Video saved" : "Removed from saved");

            try {
                await fetch('/api/video/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id, isSaved: newSavedState })
                });
            } catch (err) { console.error(err); }
        }

        function shareVideo(videoId, event) {
            if (event) event.stopPropagation();

            const shareUrl = `https://t.me/SnapSavingBot/reels?startapp=${videoId}`;

            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast("Link copied. Opening Telegram...");
                setTimeout(() => {
                    const tgText = encodeURIComponent("Check out this Reel!");
                    const tgShareLink = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${tgText}`;
                    if (tg) {
                        tg.openTelegramLink(tgShareLink);
                    } else {
                        window.open(tgShareLink, '_blank');
                    }
                }, 800);
            }).catch(() => {
                const tgText = encodeURIComponent("Check out this Reel!");
                const tgShareLink = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${tgText}`;
                if (tg) {
                    tg.openTelegramLink(tgShareLink);
                } else {
                    window.open(tgShareLink, '_blank');
                }
            });
        }

        function handleUploaderClick(uploaderId, uploaderName, uploaderPic, size, date, views, videoId) {
            activeVideoId = videoId;
            const isOfficial = uploaderName.toLowerCase().includes("reelsuploder") ||
                               uploaderName.toLowerCase().includes("reelsuploader") ||
                               uploaderId === "reelsuploder" ||
                               uploaderId === "-1002241516027";

            // Open bottom-sheet details popup
            document.getElementById('upModalPic').src = uploaderPic;
            document.getElementById('upModalName').innerText = uploaderName;
            document.getElementById('upModalSize').innerText = size || "Unknown Size";
            document.getElementById('upModalDate').innerText = date || "Unknown Date";
            document.getElementById('upModalViews').innerText = views || "0";

            // Verified Badge render inside popup
            const popupVerifiedBadge = document.getElementById('upModalVerified');
            const btnOpenProfile = document.getElementById('btnOpenTgProfile');

            if (isOfficial) {
                popupVerifiedBadge.style.display = 'flex';
                btnOpenProfile.style.display = 'none'; // Hide Open Chat button for the official channel
            } else {
                popupVerifiedBadge.style.display = 'none';
                btnOpenProfile.style.display = 'flex'; // Show Open Chat button for regular uploaders

                btnOpenProfile.onclick = function() {
                    const cleanUsername = uploaderName.replace('@', '');
                    const profileLink = `https://t.me/${cleanUsername}`;
                    if (tg) {
                        tg.openTelegramLink(profileLink);
                    } else {
                        window.open(profileLink, '_blank');
                    }
                };
            }

            // Wire up Save Video button for this specific video
            const btnSave = document.getElementById('btnSaveVideoInSheet');
            btnSave.onclick = function() { toggleSave(videoId); };
            refreshSaveButtonUI(videoId);

            // Wire up Report Video button
            const btnReport = document.getElementById('btnReportVideoInSheet');
            btnReport.onclick = function() {
                closeUploaderSheet();
                reportVideo(videoId);
            };

            document.getElementById('uploaderSheet').classList.add('open');
        }

        function closeUploaderSheet() {
            document.getElementById('uploaderSheet').classList.remove('open');
        }

        async function reportVideo(videoId) {
            const confirmMsg = appLang === "bn" ? "রিপোর্ট করতে চান?" : "Do you want to report this?";
            if (!confirm(confirmMsg)) return;

            try {
                await fetch('/api/video/report', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id, username: currentUser.username })
                });
                showToast(appLang === "bn" ? "রিপোর্ট সফল হয়েছে" : "Reported successfully");
            } catch (err) { console.error(err); }
        }

        function markAsWatched(videoId) {
            let seenVideos = JSON.parse(localStorage.getItem('seen_videos') || '[]');
            if (!seenVideos.includes(videoId)) {
                seenVideos.push(videoId);
                localStorage.setItem('seen_videos', JSON.stringify(seenVideos));
            }
        }

        async function trackView(videoId) {
            try {
                await fetch('/api/video/view', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, userId: currentUser.id })
                });
            } catch (err) { console.error(err); }
        }

        function refreshFeed(event) {
            if (event) event.stopPropagation();
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.visibility = 'visible';
                loader.style.opacity = '1';
            }
            fetchVideos();
        }

        function setupIntersectionObserver() {
            const observerOptions = { root: container, threshold: 0.6 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const videoId = entry.target.id.replace('reel-', '');
                    const index = parseInt(entry.target.getAttribute('data-index'));
                    const playIndicator = entry.target.querySelector('.play-indicator');

                    if (video) {
                        if (entry.isIntersecting) {
                            activeIndex = index;
                            updateVideoSources(activeIndex);
                            if (playIndicator) playIndicator.classList.remove('show');

                            // Explicit play unmuted on swipe/intersection
                            video.muted = false;
                            video.play().then(() => trackView(videoId)).catch(() => {
                                video.muted = true;
                                video.play().catch(() => {});
                            });
                        } else {
                            video.pause();
                            if (playIndicator) playIndicator.classList.remove('show');
                        }
                    }
                });
            }, observerOptions);
            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        function setupDoubleTap() {
            document.querySelectorAll('.reel').forEach(reel => {
                let lastTap = 0;
                reel.addEventListener('click', function(e) {
                    if (e.target.classList.contains('caption-link') || e.target.closest('.uploader-info')) return;

                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    if (tapLength < 300 && tapLength > 0) {
                        const videoId = reel.id.replace('reel-', '');
                        const heartPop = document.getElementById(`heart-pop-${videoId}`);
                        heartPop.classList.add('pop-active');
                        setTimeout(() => heartPop.classList.remove('pop-active'), 800);
                        const likeBtn = reel.querySelector('.action-button');
                        if (!likeBtn.classList.contains('liked')) toggleLike(videoId);
                    }
                    lastTap = currentTime;
                });
            });
        }

        // Two-finger pinch to zoom in / out on the active video
        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function setupPinchZoom() {
            document.querySelectorAll('.reel video').forEach(video => {
                let initialDistance = null;
                let baseScale = parseFloat(video.dataset.scale) || 1;

                video.addEventListener('touchstart', function(e) {
                    if (e.touches.length === 2) {
                        initialDistance = getTouchDistance(e.touches);
                        baseScale = parseFloat(video.dataset.scale) || 1;
                    }
                }, { passive: true });

                video.addEventListener('touchmove', function(e) {
                    if (e.touches.length === 2 && initialDistance) {
                        e.preventDefault();
                        const newDistance = getTouchDistance(e.touches);
                        let scale = baseScale * (newDistance / initialDistance);
                        scale = Math.min(Math.max(scale, 1), 3);
                        video.style.transform = `scale(${scale})`;
                        video.dataset.scale = scale;
                    }
                }, { passive: false });

                video.addEventListener('touchend', function(e) {
                    if (e.touches.length < 2) {
                        initialDistance = null;
                    }
                }, { passive: true });
            });
        }

        let activeProfileUserId = null;
        async function openProfileModal(uploaderId, uploaderName, uploaderPic) {
            activeProfileUserId = uploaderId;
            document.getElementById('modalProfileName').innerText = uploaderName;
            document.getElementById('modalProfilePic').src = uploaderPic;

            let uploadingVal = true;
            let notificationVal = true;

            // Load from local storage directly first for instantaneous UI state
            const localUpload = localStorage.getItem(`setting_upload_${uploaderId}`);
            const localNotify = localStorage.getItem(`setting_notify_${uploaderId}`);

            if (localUpload !== null) uploadingVal = localUpload === 'true';
            if (localNotify !== null) notificationVal = localNotify === 'true';

            try {
                const res = await fetch(`/api/user/settings?userId=${uploaderId}`);
                if (res.ok) {
                    const settings = await res.json();
                    uploadingVal = settings.uploadingReels !== false;
                    notificationVal = settings.notifications !== false;

                    localStorage.setItem(`setting_upload_${uploaderId}`, uploadingVal ? 'true' : 'false');
                    localStorage.setItem(`setting_notify_${uploaderId}`, notificationVal ? 'true' : 'false');
                }
            } catch (err) {
                console.log("Failed to sync modal settings with server, using local fallback");
            }

            document.getElementById('uploadToggle').checked = uploadingVal;
            document.getElementById('notificationToggle').checked = notificationVal;

            if (uploaderId !== currentUser.id) {
                document.getElementById('uploadToggle').disabled = true;
                document.getElementById('notificationToggle').disabled = true;
            } else {
                document.getElementById('uploadToggle').disabled = false;
                document.getElementById('notificationToggle').disabled = false;
            }
            document.getElementById('profileModal').classList.add('open');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('open');
        }

        async function updateProfileSetting() {
            if (activeProfileUserId !== currentUser.id) return;
            const uploadingVal = document.getElementById('uploadToggle').checked;
            const notificationVal = document.getElementById('notificationToggle').checked;

            localStorage.setItem(`setting_upload_${currentUser.id}`, uploadingVal ? 'true' : 'false');
            localStorage.setItem(`setting_notify_${currentUser.id}`, notificationVal ? 'true' : 'false');

            try {
                await fetch('/api/user/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: currentUser.id,
                        uploadingReels: uploadingVal,
                        notifications: notificationVal
                    })
                });
                showToast("Preferences updated successfully");
            } catch (err) {
                console.error("Failed to sync settings", err);
            }
        }

        applyOwnProfileBar();
        adjustOverlayOffset();
        fetchLanguageAndVideos();
    </script>
