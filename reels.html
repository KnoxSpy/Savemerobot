<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SnavSaving Shorts</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Top Action Bar (Refresh Option) */
        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .refresh-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Spin animation when refreshed */
        .spinning {
            animation: spin 0.8s linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ultra-Smooth Fullscreen scroll container */
        .reels-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            transform: translate3d(0, 0, 0); /* Hardware Acceleration */
        }

        /* Individual Reel Section */
        .reel {
            position: relative;
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Video element optimized (No zoom, original size, smooth-fade) */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* জুম ছাড়া মেইন সাইজ প্রদর্শন করবে */
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        video.loaded {
            opacity: 1;
        }

        /* Overlay Layout */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 80px 20px 40px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 5;
        }

        .video-details {
            max-width: 75%;
            color: #fff;
            pointer-events: auto;
        }

        .video-details h3 {
            font-size: 16px;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        .video-details p {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Right Side Actions Panel */
        .actions-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            pointer-events: auto;
            margin-bottom: 10px;
        }

        .action-button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            transition: transform 0.15s;
        }

        .action-button:active {
            transform: scale(0.85);
        }

        .action-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            backdrop-filter: blur(8px);
            transition: background 0.3s;
        }

        .action-button.liked .action-icon {
            background: #e53e3e;
            color: #fff;
        }

        .action-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Double Tap Heart Animation */
        .heart-pop {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #e53e3e;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes heartPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.6); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .pop-active {
            animation: heartPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Shimmer Loader style */
        .loading {
            position: absolute;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="refresh-btn" onclick="refreshFeed()" id="refreshBtn">
            <svg viewBox="0 0 24 24">
                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
        </button>
    </div>

    <div class="reels-container" id="reelsContainer">
        <!-- Videos will be injected dynamically here -->
    </div>

    <script>
        let videos = [];
        const container = document.getElementById('reelsContainer');

        async function fetchVideos() {
            try {
                const res = await fetch('/api/videos');
                videos = await res.json();
                renderVideos();
            } catch (err) {
                console.error("Failed to load videos", err);
            }
        }

        function renderVideos() {
            if (videos.length === 0) {
                container.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100vh;">কোনো ভিডিও খুঁজে পাওয়া যায়নি।</div>`;
                return;
            }

            container.innerHTML = videos.map((video, index) => {
                const streamUrl = `/api/video/stream/${encodeURIComponent(video.fileId)}`;
                const isLiked = localStorage.getItem(`liked_${video.id}`) === 'true';

                return `
                    <div class="reel" id="reel-${video.id}" data-index="${index}">
                        <div class="loading">লোডিং হচ্ছে...</div>
                        <video src="${streamUrl}" loop playsinline webkit-playsinline preload="metadata" onloadedmetadata="videoLoaded(this)" onclick="togglePlay(this)"></video>
                        
                        <!-- Heart animation on double-tap -->
                        <div class="heart-pop" id="heart-pop-${video.id}">
                            <svg viewBox="0 0 24 24" width="80" height="80" fill="currentColor">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </div>

                        <div class="overlay">
                            <div class="video-details">
                                <h3>@reelsuploder</h3>
                                <p>${video.caption || "কোনো ক্যাপশন দেওয়া হয়নি।"}</p>
                            </div>

                            <div class="actions-panel">
                                <!-- Love Button -->
                                <button class="action-button ${isLiked ? 'liked' : ''}" onclick="toggleLike('${video.id}', event)">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                        </svg>
                                    </div>
                                    <span id="like-count-${video.id}">${video.likes || 0}</span>
                                </button>

                                <!-- Views Button -->
                                <div class="action-button" style="pointer-events: none;">
                                    <div class="action-icon">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                        </svg>
                                    </div>
                                    <span id="view-count-${video.id}">${video.views || 0}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            setupIntersectionObserver();
            setupDoubleTap();
        }

        // Triggered when video is ready (Smooth Fade-in)
        function videoLoaded(videoElement) {
            videoElement.classList.add('loaded');
            const loadingText = videoElement.parentElement.querySelector('.loading');
            if (loadingText) loadingText.style.display = 'none';
        }

        function togglePlay(video) {
            if (video.paused) {
                video.play().catch(e => console.log("Blocked play"));
            } else {
                video.pause();
            }
        }

        // Like/Love action logic
        async function toggleLike(videoId, event) {
            if (event) event.stopPropagation();
            
            const likeBtn = document.querySelector(`#reel-${videoId} .action-button`);
            const likeCountSpan = document.getElementById(`like-count-${videoId}`);
            const isLiked = likeBtn.classList.contains('liked');
            let currentLikes = parseInt(likeCountSpan.innerText);

            const newLikedState = !isLiked;
            if (newLikedState) {
                likeBtn.classList.add('liked');
                likeCountSpan.innerText = currentLikes + 1;
                localStorage.setItem(`liked_${videoId}`, 'true');
            } else {
                likeBtn.classList.remove('liked');
                likeCountSpan.innerText = Math.max(0, currentLikes - 1);
                localStorage.removeItem(`liked_${videoId}`);
            }

            try {
                await fetch('/api/video/like', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId, isLiked: newLikedState })
                });
            } catch (err) {
                console.error("Error updating like", err);
            }
        }

        // Track Video Views
        async function trackView(videoId) {
            try {
                const viewCountSpan = document.getElementById(`view-count-${videoId}`);
                if (viewCountSpan) {
                    let currentViews = parseInt(viewCountSpan.innerText);
                    viewCountSpan.innerText = currentViews + 1;
                }

                await fetch('/api/video/view', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ videoId })
                });
            } catch (err) {
                console.error("View track error", err);
            }
        }

        // Feed Refresh Action with Rotation Animation
        function refreshFeed() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            
            // রিলোড এবং রি-সর্ট ভিডিও
            fetchVideos().then(() => {
                setTimeout(() => {
                    btn.classList.remove('spinning');
                }, 800);
            });
        }

        // Intersection Observer with precise performance optimization
        function setupIntersectionObserver() {
            const observerOptions = {
                root: container,
                threshold: 0.65
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const videoId = entry.target.id.replace('reel-', '');

                    if (video) {
                        if (entry.isIntersecting) {
                            video.play().then(() => {
                                trackView(videoId);
                            }).catch(err => {
                                console.log("Autoplay require click interaction");
                            });
                        } else {
                            video.pause();
                            video.currentTime = 0;
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
        }

        // Double tap setup
        function setupDoubleTap() {
            document.querySelectorAll('.reel').forEach(reel => {
                let lastTap = 0;
                reel.addEventListener('click', function(e) {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    if (tapLength < 300 && tapLength > 0) {
                        const videoId = reel.id.replace('reel-', '');
                        
                        const heartPop = document.getElementById(`heart-pop-${videoId}`);
                        heartPop.classList.add('pop-active');
                        setTimeout(() => heartPop.classList.remove('pop-active'), 800);

                        const likeBtn = reel.querySelector('.action-button');
                        if (!likeBtn.classList.contains('liked')) {
                            toggleLike(videoId);
                        }
                    }
                    lastTap = currentTime;
                });
            });
        }

        fetchVideos();
    </script>
</body>
</html>
